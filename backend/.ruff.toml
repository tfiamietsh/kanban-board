exclude = [
    ".git",
    ".venv",
    ".vscode",
    "__pycache__",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv"
]

line-length = 79
indent-width = 4
target-version = "py313"

[lint]
select = ["E4", "E7", "E9", "F"]
ignore = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
